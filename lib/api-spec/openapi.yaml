openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RERA Agents API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agents
    description: RERA agent operations
  - name: scraper
    description: Scraping operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all RERA agents
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: agentType
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get a single RERA agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found

  /agents/stats:
    get:
      operationId: getAgentStats
      tags: [agents]
      summary: Get aggregate stats about agents
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStats"

  /scraper/run:
    post:
      operationId: triggerScrape
      tags: [scraper]
      summary: Trigger the RERA website scraper
      parameters:
        - name: maxPages
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Scraper result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScraperResult"

  /scraper/status:
    get:
      operationId: getScraperStatus
      tags: [scraper]
      summary: Get the scraper status and last run info
      responses:
        "200":
          description: Scraper status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScraperStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Agent:
      type: object
      properties:
        id:
          type: integer
        serialNumber:
          type: ["integer", "null"]
        name:
          type: string
        agentType:
          type: string
        designation:
          type: ["string", "null"]
        personName:
          type: ["string", "null"]
        registeredAddress:
          type: ["string", "null"]
        phoneNumber:
          type: ["string", "null"]
        emailId:
          type: ["string", "null"]
        registrationNo:
          type: ["string", "null"]
        validUntil:
          type: ["string", "null"]
        certificateUrl:
          type: ["string", "null"]
        renewalCount:
          type: ["integer", "null"]
        scrapedAt:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - agentType
        - scrapedAt
        - createdAt
        - updatedAt

    AgentListResponse:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - agents
        - total
        - page
        - limit
        - totalPages

    AgentStats:
      type: object
      properties:
        total:
          type: integer
        individuals:
          type: integer
        companies:
          type: integer
        expired:
          type: integer
        active:
          type: integer
        lastScrapedAt:
          type: ["string", "null"]
      required:
        - total
        - individuals
        - companies
        - expired
        - active

    ScraperResult:
      type: object
      properties:
        success:
          type: boolean
        agentsScraped:
          type: integer
        agentsInserted:
          type: integer
        agentsUpdated:
          type: integer
        message:
          type: string
        error:
          type: ["string", "null"]
      required:
        - success
        - agentsScraped
        - agentsInserted
        - agentsUpdated
        - message

    ScraperStatus:
      type: object
      properties:
        lastRunAt:
          type: ["string", "null"]
        totalAgents:
          type: integer
        isRunning:
          type: boolean
      required:
        - totalAgents
        - isRunning
